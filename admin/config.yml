backend:
  name: github
  repo: otian1434-star/my-gas-link
  branch: main
  base_url: https://yaowu-cms-oauth.otian1434.workers.dev
  auth_endpoint: auth

local_backend: true
locale: zh_Hant
media_folder: assets/uploads
public_folder: /my-gas-link/assets/uploads

collections:
  - name: site_data
    label: 網站內容
    files:
      - name: posts
        label: 文章管理（新增網站文章）
        file: data/posts.json
        fields:
          - label: 文章
            name: posts
            widget: list
            summary: "{{fields.date}} [{{fields.category}}] {{fields.title}}"
            hint: 新增文章請在這個「文章」清單按新增。儲存發布後，文章會自動出現在首頁「最新公告」與「最新文章」頁，不會自動出現在首頁「伺服器資訊」的最新更新卡片。
            fields:
              - { label: 標題, name: title, widget: string }
              - label: 分類
                name: category
                widget: select
                options: [公告, 活動, 更新, 規章, 攻略, 下載, 制裁名單]
                default: 公告
              - label: 版面樣式
                name: layout
                widget: select
                options:
                  - { label: 標準文章, value: standard }
                  - { label: 重點公告, value: featured }
                  - { label: 簡短公告, value: compact }
                default: standard
              - { label: 日期, name: date, widget: datetime, format: "YYYY/MM/DD", date_format: "YYYY/MM/DD", time_format: false }
              - { label: 顯示在網站, name: published, widget: boolean, default: true }
              - { label: 置頂, name: pinned, widget: boolean, default: false }
              - { label: 封面圖片, name: coverImage, widget: image, required: false }
              - { label: 摘要, name: excerpt, widget: text, required: false }
              - label: 文章內文
                name: body
                widget: yaowu_markdown
                hint: 建議優先在這裡發文。上方按鈕與範本會輸出官方統一風格，右側可切換桌面/手機預覽，儲存後會顯示在首頁最新公告與最新文章頁。
              - label: 自訂 HTML 區塊
                name: customHtml
                widget: code
                default_language: html
                allow_language_selection: false
                required: false
                hint: 進階排版使用。一般發文不必填這裡；若要貼入 div、table、iframe 或特殊版面，請使用 cms-grid、cms-panel、cms-callout、cms-button 等官方 class，並只讓可信任管理者使用。
      - name: home
        label: 首頁底板管理（目錄/伺服器資訊/更新歷程）
        file: data/home.json
        fields:
          - label: 區塊標題
            name: sections
            widget: object
            fields:
              - label: 最新公告區塊
                name: announcements
                widget: object
                fields:
                  - { label: 小字標題, name: eyebrow, widget: string, required: false }
                  - { label: 大標題, name: title, widget: string }
                  - { label: 按鈕文字, name: buttonText, widget: string, required: false }
                  - { label: 按鈕連結, name: buttonUrl, widget: string, required: false }
              - label: 快速目錄區塊
                name: quickLinks
                widget: object
                fields:
                  - { label: 小字標題, name: eyebrow, widget: string, required: false }
                  - { label: 大標題, name: title, widget: string }
              - label: 伺服器資訊區塊
                name: serverInfo
                widget: object
                fields:
                  - { label: 小字標題, name: eyebrow, widget: string, required: false }
                  - { label: 大標題, name: title, widget: string }
              - label: 更新歷程區塊
                name: updates
                widget: object
                fields:
                  - { label: 小字標題, name: eyebrow, widget: string, required: false }
                  - { label: 大標題, name: title, widget: string }
                  - { label: 按鈕文字, name: buttonText, widget: string, required: false }
                  - { label: 按鈕連結, name: buttonUrl, widget: string, required: false }
          - label: 快速目錄卡片
            name: quickLinks
            widget: list
            summary: "{{fields.title}} → {{fields.url}}"
            fields:
              - { label: 顯示, name: visible, widget: boolean, default: true }
              - { label: 圖示, name: icon, widget: string, hint: 可填 emoji，例如 📥 或 ⚔️ }
              - { label: 標題, name: title, widget: string }
              - { label: 說明文字, name: description, widget: string, required: false }
              - { label: 連結, name: url, widget: string }
              - { label: 重點卡片, name: highlight, widget: boolean, default: false }
          - label: 伺服器資訊卡片
            name: serverCards
            widget: list
            summary: "{{fields.title}}"
            hint: 這裡控制首頁「伺服器資訊」區塊。你截圖中的「最新更新」卡片也是這裡的卡片；要刪除或新增卡片，請在此清單操作。
            fields:
              - { label: 標題, name: title, widget: string }
              - { label: 副標題, name: subtitle, widget: string, required: false }
              - label: 內容列
                name: rows
                widget: list
                summary: "{{fields.label}}：{{fields.value}}"
                fields:
                  - { label: 左側文字, name: label, widget: string }
                  - { label: 右側內容, name: value, widget: string }
                  - { label: 金色強調, name: highlight, widget: boolean, default: false }
          - label: 更新歷程清單
            name: updates
            widget: list
            summary: "{{fields.date}} [{{fields.tag}}] {{fields.content}}"
            hint: 這裡會顯示在首頁下方「更新歷程」與「更新歷程」頁面。這不是一般發文區；一般公告文章請到「文章管理」新增。
            fields:
              - { label: 顯示, name: visible, widget: boolean, default: true }
              - { label: 日期, name: date, widget: datetime, format: "YYYY/MM/DD", date_format: "YYYY/MM/DD", time_format: false }
              - { label: 標籤, name: tag, widget: string }
              - { label: 標題, name: title, widget: string, required: false }
              - { label: 內容, name: content, widget: text }
