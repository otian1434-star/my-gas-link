<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" sizes="32x32" href="../assets/media/favicon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="../assets/media/apple-touch-icon.png">
<meta name="theme-color" content="#0d0b08">
<title>活動金幣 - 曜舞天堂</title>
<link rel="stylesheet" href="../assets/css/style.css">
<script src="../config.js"></script>
</head>
<body>
<div id="header-slot"></div>
<div id="nav-slot"></div>
<div id="main-wrap">
<div id="page-content" class="event-coin-page">

<div class="page-hdr">
  <h1>🎉 活動金幣</h1>
  <p>全服狂歡：活動幣收集指南</p>
</div>

<div class="content-card event-coin-hero">
  <span class="guide-kicker">EVENT COIN</span>
  <h2>全境打怪收集活動幣，兌換專屬練功地圖鑰匙</h2>
  <p>活動幣是全服活動期間的重要資源。只要持續狩獵、累積活動幣，就能兌換專屬練功地圖鑰匙，開啟更高速的成長路線。</p>
</div>

<div class="event-coin-grid">
  <div class="content-card event-coin-card">
    <div class="event-coin-icon">🪙</div>
    <h2>活動幣機制</h2>
    <p><strong>全境掉落：</strong>不限區域，只要在亞丁大陸的任何地圖擊殺怪物，皆有機率掉落活動幣。</p>
  </div>
  <div class="content-card event-coin-card key">
    <div class="event-coin-icon">🗝️</div>
    <h2>專屬用途</h2>
    <p><strong>兌換鑰匙：</strong>收集足夠的活動幣，即可兌換專屬練功地圖鑰匙，進入高經驗的修練聖地。</p>
  </div>
</div>

<div class="content-card event-coin-summary">
  <h2>✨ 兌換提醒</h2>
  <p><strong>掌握鑰匙，進入高經驗的修練聖地。</strong></p>
  <p>練功地圖的詳細資訊與兌換數量，請至遊戲內活動 NPC 處查看。</p>
</div>

</div>
</div>
<div id="footer-slot"></div>
<script src="../assets/js/forum.js"></script>
</body>
</html>
