<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>地圖介紹 - 曜天堂論壇</title>
<link rel="stylesheet" href="../assets/css/style.css">
<script src="../config.js"></script>
</head>
<body>
<div id="header-slot"></div>
<div id="nav-slot"></div>
<div id="main-wrap">
<div id="page-content">

<div class="page-hdr">
  <h1>🗺️ 地圖介紹</h1>
  <p>各區域地圖詳細說明</p>
</div>

<div class="content-card" style="padding:0;overflow:hidden;">
  <div id="loading-map" style="padding:60px;text-align:center;background:var(--bg-secondary);">
    <div style="font-size:48px;margin-bottom:16px;">🗺️</div>
    <div style="color:var(--gold);font-size:18px;letter-spacing:3px;animation:pulse 1.5s infinite;">地圖載入中...</div>
    <style>@keyframes pulse{0%,100%{opacity:0.5}50%{opacity:1}}</style>
  </div>
  <iframe id="content-map"
    src="https://script.google.com/macros/s/AKfycbzmRjPOsDlgisbW2GJ9IpGpa9BlVbdbgZP2I56hT6JJA8EcX2BX-hm0Ugp9bpYmhwij/exec"
    style="width:100%;height:3500px;border:none;display:none;"
    onload="document.getElementById('loading-map').style.display='none';this.style.display='block';">
  </iframe>
</div>

</div>
</div>
<div id="footer-slot"></div>
<script src="../assets/js/forum.js"></script>
</body>
</html>
