<div class="page-hdr">
  <h1>🤔 加速器迷思</h1>
  <p>了解遊戲視覺效果的真相</p>
</div>

<div class="content-card">
  <h2 style="color:var(--gold);border-bottom:1px solid rgba(212,175,55,0.3);padding-bottom:12px;margin-top:0;">為何感覺像加速？</h2>
  <p style="color:var(--text-secondary);font-size:1.05em;line-height:1.9;margin-bottom:20px;">
    <strong style="color:var(--gold);">多重指令下的視覺暫留：</strong>當任何職業與任何變身，於走路時受到多重指令時，在對方視角皆會有加速的情況發生！
  </p>
  <ul style="color:var(--text-secondary);line-height:2.2;padding-left:20px;font-size:1.02em;">
    <li>邊走路邊施法</li>
    <li>邊施法邊攻擊</li>
    <li>遭受集體攻擊</li>
    <li>內掛時遭受攻擊卡頓</li>
  </ul>
</div>

<div class="content-card">
  <h2 style="color:var(--gold);border-bottom:1px solid rgba(212,175,55,0.3);padding-bottom:12px;margin-top:0;">系統原理：畫面同步的影響</h2>
  <p style="color:var(--text-secondary);font-size:1.05em;line-height:1.9;">
    由於系統在針對每一位的玩家畫面能夠同步，所以才會有類似加速的處理！
  </p>
  <div class="notice gold" style="margin-top:15px;">
    💡 在您誤會對方有開啟加速器時，對方看您也是會有<strong>爆衝加速的狀況</strong>唷！
  </div>
  <p style="color:var(--text-secondary);font-size:1.02em;line-height:1.9;margin-top:20px;">
    這是遊戲引擎本身的網路同步機制所造成的視覺現象，並非真正使用加速器。管理團隊有完善的偵測系統，外掛使用者無所遁形。
  </p>
</div>
