<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" sizes="32x32" href="../assets/media/favicon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="../assets/media/apple-touch-icon.png">
<meta name="theme-color" content="#0d0b08">
<title>遊戲下載 - 曜舞天堂</title>
<link rel="stylesheet" href="../assets/css/style.css">
<script src="../config.js"></script>
</head>
<body>
<div id="header-slot"></div>
<div id="nav-slot"></div>
<div id="main-wrap">
<div id="page-content">

<div class="page-hdr">
  <h1>📥 遊戲下載</h1>
  <p>主程式下載與安裝排錯說明</p>
</div>

<div id="js-download-content">載入中…</div>

</div>
</div>
<div id="footer-slot"></div>
<script src="../assets/js/forum.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  var C = FORUM_CONFIG;
  var d = C.download;
  var downloadFiles = [
    { label: 'ZIP', title: 'ZIP 壓縮檔', url: d.backup3 || d.mainUrl, note: '建議優先下載' },
    { label: 'RAR', title: 'RAR 壓縮檔', url: d.backup1, note: '備用格式' },
    { label: '7Z', title: '7Z 壓縮檔', url: d.backup2, note: '備用格式' }
  ].filter(function(file) { return file.url; });
  var downloadButtons = downloadFiles.map(function(file) {
    return '<a href="' + file.url + '" target="_blank" rel="noopener" style="display:block;text-decoration:none;background:#2a2112;border:2px solid #ffd700;border-radius:10px;padding:18px 16px;color:#fff;text-align:center;box-shadow:0 0 16px rgba(255,215,0,0.22);">' +
      '<strong style="display:block;color:#ffd700;font-size:1.35em;margin-bottom:6px;">' + file.title + '</strong>' +
      '<span style="display:inline-block;background:#4d0000;color:#ffd700;border:1px solid rgba(255,215,0,0.55);padding:3px 12px;border-radius:999px;font-weight:bold;letter-spacing:1px;">' + file.label + '</span>' +
      '<p style="margin:10px 0 0;color:#f4e4bc;font-weight:bold;">' + file.note + '</p>' +
    '</a>';
  }).join('');
  document.getElementById('js-download-content').innerHTML = `
  <div style="
    font-family:'Microsoft JhengHei',sans-serif;color:#ffffff;
    background:radial-gradient(circle,#2c2c2c 0%,#000 100%);
    padding:30px;border:6px solid #ffd700;border-radius:15px;
    box-shadow:0 0 30px rgba(255,215,0,0.7);max-width:950px;margin:0 auto;line-height:1.6;">

    <h2 style="color:#ffd700;border-bottom:4px double #ffd700;padding-bottom:15px;margin-top:0;text-align:center;font-size:2.2em;text-shadow:2px 2px 4px #000;">
      遊戲下載
    </h2>

    <!-- 主程式下載 -->
    <div style="background:#101812;border:3px solid #ffd700;border-radius:10px;padding:22px;margin-bottom:30px;box-shadow:inset 0 0 15px #000;">
      <div style="text-align:center;margin-bottom:18px;">
        <strong style="color:#ffd700;font-size:1.55em;letter-spacing:2px;">曜舞天堂主程式下載</strong>
        <p style="margin:8px 0 0;color:#f4e4bc;font-weight:bold;">更新日期：${d.updateDate || '最新版本'}，請擇一格式下載後解壓縮。</p>
        <p style="margin:4px 0 0;color:#f4e4bc;">提供 ZIP、RAR、7Z 三種雲端下載點，任選其一即可。</p>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;">
        ${downloadButtons || '<p style="text-align:center;color:#ffd700;font-weight:bold;margin:0;">下載連結準備中，請稍後再試。</p>'}
      </div>
    </div>

    <!-- 官方代客下載 -->
    <div style="background:#4d0000;border:3px solid #ffd700;border-radius:10px;padding:20px;margin-bottom:30px;display:flex;align-items:center;gap:20px;box-shadow:inset 0 0 15px #000;">
      <span style="font-size:3em;">❤️</span>
      <div style="flex:1;">
        <strong style="color:#ffd700;font-size:1.4em;">官方代客下載服務</strong>
        <p style="margin:5px 0 0 0;color:#fff;font-weight:bold;">
          考量部分玩家不熟悉安裝流程，我們提供 <span style="color:#ffd700;font-size:1.1em;">「代客遠端安裝」</span> 服務！請洽詢官方 LINE@ 由小編協助。
        </p>
        <div style="margin:15px 0;">
          <span style="font-size:0.95em;">🛡️ 遠端協助請先準備好：</span>
          <a href="${d.anyDeskUrl}" target="_blank" style="background:#1e88e5;color:#fff;padding:8px 15px;text-decoration:none;border-radius:5px;font-weight:bold;margin-left:10px;display:inline-block;">📥 下載 AnyDesk</a>
        </div>
        <a href="javascript:void(0)" onclick="window.open(FORUM_CONFIG.lineOfficial,'_blank')" style="background:#06c755;color:#fff;padding:10px 25px;text-decoration:none;border:2px solid #fff;border-radius:5px;font-weight:bold;font-size:1.1em;display:inline-block;">👉 點我聯絡官方 LINE@</a>
      </div>
    </div>

    <!-- 輔助工具教學 -->
    <div style="border:2px dashed #00e676;border-radius:10px;padding:15px 20px;background:rgba(0,230,118,0.05);margin-bottom:40px;text-align:center;">
      <div style="text-align:left;">
        <div style="color:#ffd700;font-weight:bold;font-size:1.25em;margin-bottom:8px;text-align:center;">曜舞天堂輔助工具教學</div>
        <p style="color:#f4e4bc;margin:0 auto 14px;max-width:780px;text-align:center;line-height:1.8;">
          輔助工具可快速套用相容性、打開防毒排除設定、復原登入器，也能新增或移除雙螢幕插件。
        </p>
        <img src="../assets/media/download/yaowu-helper-tool.png" alt="曜舞天堂輔助工具教學" style="display:block;width:100%;max-width:760px;margin:0 auto 18px;border-radius:6px;border:1px solid #00e676;box-shadow:0 0 18px rgba(0,230,118,0.18);">
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px;">
          <div style="background:#101812;border:1px solid rgba(0,230,118,0.45);padding:14px;border-radius:8px;">
            <strong style="color:#00e676;font-size:1.05em;">快速套用相容性 / 打開排除設定</strong>
            <ol style="margin:10px 0 0;padding-left:20px;color:#f4e4bc;line-height:1.8;">
              <li>先將輔助工具放在曜舞天堂資料夾內執行。</li>
              <li>點選「套用相容性」，自動完成高 DPI 與系統管理員設定。</li>
              <li>點選「打開排除設定」，依照畫面提示把曜舞天堂資料夾加入排除。</li>
            </ol>
          </div>
          <div style="background:#101812;border:1px solid rgba(255,215,0,0.45);padding:14px;border-radius:8px;">
            <strong style="color:#ffd700;font-size:1.05em;">新增或移除雙螢幕插件</strong>
            <ol style="margin:10px 0 0;padding-left:20px;color:#f4e4bc;line-height:1.8;">
              <li>需要雙螢幕插件時，使用工具安裝後再啟動登入器。</li>
              <li>若遊戲顯示異常或不需使用，點選「移除雙螢幕插件」。</li>
              <li>操作前請先關閉遊戲與登入器，避免檔案被占用。</li>
            </ol>
          </div>
        </div>
      </div>
    </div>

    <hr style="border:0;border-top:2px double #ffd700;margin:40px 0;">

    <!-- 防毒排除 -->
    <h3 style="color:#ff4500;border-left:10px solid #ff4500;padding-left:15px;font-size:1.6em;background:rgba(255,69,0,0.1);">🛡️ 登入器遺失 / 防毒排除設定</h3>
    <p style="color:#ffd700;font-weight:bold;margin-bottom:20px;">若登入器被防毒誤刪，請照以下四個步驟將資料夾加入排除項目：</p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:25px;">
      <div style="border:2px solid #ffd700;padding:15px;border-radius:10px;background:#1a1a1a;">
        <strong style="color:#ffd700;">步驟 1：開啟 Windows 安全性</strong><br>
        <span style="font-size:0.95em;color:#f4e4bc;">進入「病毒與威脅防護」</span>
        <img src="https://telegraph-image-1n0.pages.dev/file/AgACAgUAAyEGAAS3SV8sAAICammDZg5khRUafp4yxFaiUeT_tXOAAALWD2sbTP4YVBh66GyGDN5hAQADAgADdwADOAQ.png" style="width:100%;margin-top:10px;border-radius:5px;border:1px solid #ffd700;">
      </div>
      <div style="border:2px solid #ffd700;padding:15px;border-radius:10px;background:#1a1a1a;">
        <strong style="color:#ffd700;">步驟 2：進入管理設定</strong><br>
        <span style="font-size:0.95em;color:#f4e4bc;">點選「管理設定」連結</span>
        <img src="https://telegraph-image-1n0.pages.dev/file/AgACAgUAAyEGAAS3SV8sAAICa2mDZkS5jLHwMviaplc_LvSZ5myGAALXD2sbTP4YVBripGgTiMf2AQADAgADeAADOAQ.png" style="width:100%;margin-top:10px;border-radius:5px;border:1px solid #ffd700;">
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:40px;">
      <div style="border:2px solid #ffd700;padding:15px;border-radius:10px;background:#1a1a1a;">
        <strong style="color:#ffd700;">步驟 3：新增排除項目</strong><br>
        <span style="font-size:0.95em;color:#f4e4bc;">移至最下方點選「新增或移除排除項目」</span>
        <img src="https://telegraph-image-1n0.pages.dev/file/AgACAgUAAyEGAAS3SV8sAAICbGmDZnoFi6UH_5WoVnkO9UJPr5y-AALYD2sbTP4YVEiR1cqXZWZlAQADAgADeQADOAQ.png" style="width:100%;margin-top:10px;border-radius:5px;border:1px solid #ffd700;">
      </div>
      <div style="border:2px solid #ffd700;padding:15px;border-radius:10px;background:#1a1a1a;">
        <strong style="color:#ffd700;">步驟 4：選擇資料夾</strong><br>
        <span style="font-size:0.95em;color:#f4e4bc;">選擇「曜舞天堂」資料夾，重新解壓縮或使用輔助工具復原登入器即可</span>
        <img src="../assets/media/download/defender-exclusion-folder.png" style="width:100%;margin-top:10px;border-radius:5px;border:1px solid #ffd700;">
      </div>
    </div>

    <!-- 閃退修復 -->
    <h3 style="color:#ffd700;border-left:10px solid #ffd700;padding-left:15px;font-size:1.6em;background:rgba(255,215,0,0.1);">⚡ 遊戲閃退 / 相容性設定</h3>
    <div style="background:#1a1a1a;padding:25px;border-radius:10px;border:3px solid #ffd700;margin-bottom:40px;">
      <ol style="margin:0;padding-left:20px;color:#f4e4bc;font-size:1.1em;font-weight:bold;line-height:2.2;">
        <li>在遊戲主程式按右鍵 → 選「內容」</li>
        <li>切換至「相容性」分頁</li>
        <li>點選「變更高 DPI 設定」</li>
        <li>勾選「覆寫高 DPI 縮放比例行為」</li>
        <li>勾選「以系統管理員的身分執行此程式」</li>
        <li>完成後重新開啟曜舞天堂即可</li>
      </ol>
    </div>
  </div>`;
});
</script>
</body>
</html>
