<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" sizes="32x32" href="assets/media/favicon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="assets/media/apple-touch-icon.png">
<meta name="theme-color" content="#0d0b08">
<title>曜舞天堂 經典不敗</title>
<link rel="stylesheet" href="assets/css/style.css">
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<script src="config.js"></script>
</head>
<body>

<div id="header-slot"></div>

<!-- ══ Hero ══ -->
<section id="hero">
  <div class="hero-bg-layer" id="hero-bg">
    <video class="hero-video" id="hero-video" autoplay muted loop playsinline></video>
  </div>
  <div class="hero-content">
    <div class="hero-copy">
      <img class="hero-brand-logo" id="hero-brand-logo" src="assets/media/brand-logo.png" alt="曜舞天堂 LOGO">
      <div class="hero-eyebrow" id="hero-eyebrow">LINEAGE PRIVATE SERVER</div>
      <h1 class="hero-title" id="hero-title-main">
        曜舞天堂<span id="hero-title-sub">經典不敗</span>
      </h1>
      <p class="hero-tagline" id="hero-tagline"></p>
      <div class="hero-divider"></div>
      <div class="hero-stats" id="hero-stats"></div>
      <div class="hero-btns">
        <a class="btn-primary" href="register.html">立即申請帳號</a>
        <a class="btn-outline" href="pages/download.html">遊戲下載</a>
        <a class="btn-outline" href="pages/news.html">最新文章</a>
      </div>
    </div>
    <img class="hero-character" id="hero-character" src="assets/media/hero-characters.png" alt="曜舞天堂 經典主視覺">
  </div>
  <div class="hero-youtube-card" aria-label="曜舞天堂影片">
    <div class="hero-youtube-frame">
      <iframe
        src="https://www.youtube.com/embed/EjT9yEv3z0Y?start=2&autoplay=1&rel=0&modestbranding=1&playsinline=1"
        title="曜舞天堂影片"
        loading="eager"
        allow="autoplay; accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        allowfullscreen>
      </iframe>
    </div>
  </div>
  <div class="hero-scroll">
    <div class="hero-scroll-line"></div>
    <span>向下探索</span>
  </div>
</section>

<!-- ══ 最新公告 ══ -->
<section class="section">
  <div class="container">
    <div class="section-header">
      <div class="section-eyebrow" id="ann-eyebrow">ANNOUNCEMENTS</div>
      <h2 class="section-title" id="ann-title">最新公告</h2>
      <div class="section-line"></div>
    </div>
    <div class="ann-grid" id="ann-grid"></div>
    <div style="text-align:center;margin-top:26px;">
      <a class="btn-outline" id="ann-button" href="pages/news.html">查看全部公告</a>
    </div>
  </div>
</section>

<!-- ══ 快速目錄 ══ -->
<section class="section section-alt section-bg-quick">
  <div class="container">
    <div class="section-header">
      <div class="section-eyebrow" id="quick-eyebrow">QUICK NAVIGATION</div>
      <h2 class="section-title" id="quick-title">快速目錄</h2>
      <div class="section-line"></div>
    </div>
    <div class="dir-grid" id="dir-grid"></div>
  </div>
</section>

<!-- ══ 伺服器資訊 ══ -->
<section class="section section-bg-server">
  <div class="container">
    <div class="section-header">
      <div class="section-eyebrow" id="server-eyebrow">SERVER INFO</div>
      <h2 class="section-title" id="server-title">伺服器資訊</h2>
      <div class="section-line"></div>
    </div>
    <div class="server-grid" id="server-info"></div>
  </div>
</section>

<!-- ══ 更新歷程 ══ -->
<section class="section section-alt">
  <div class="container">
    <div class="section-header">
      <div class="section-eyebrow" id="updates-eyebrow">PATCH NOTES</div>
      <h2 class="section-title" id="updates-title">更新歷程</h2>
      <div class="section-line"></div>
    </div>
    <div class="update-list" id="update-list"></div>
    <div style="text-align:center;margin-top:26px;">
      <a class="btn-outline" id="updates-button" href="pages/updates.html">查看完整歷程</a>
    </div>
  </div>
</section>

<div id="footer-slot"></div>

<script src="assets/js/cms-posts.js"></script>
<script src="assets/js/forum.js"></script>
<script>
if (window.netlifyIdentity) {
  window.netlifyIdentity.on('init', function (user) {
    if (!user) {
      window.netlifyIdentity.on('login', function () {
        document.location.href = '/admin/';
      });
    }
  });
}
(function () {
  function escapeHTML(value) {
    return String(value || '').replace(/[&<>"']/g, function (char) {
      return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[char];
    });
  }

  function resolveLink(url) {
    if (/^(https?:|mailto:|tel:|#)/.test(url || '')) return url;
    return String(url || '#').replace(/^\.\//, '');
  }

  function defaultHome(C) {
    const updates = Array.isArray(C.updates) ? C.updates : [];
    const serverCards = [
      {
        title: C.forumName,
        subtitle: 'MAIN SERVER · ' + (C.serverVersion || '3.81'),
        rows: [
          { label: '版本', value: C.serverVersion || '3.81', highlight: true },
          { label: '經驗倍率', value: '× 3', highlight: true },
          { label: '掉落倍率', value: '× 2', highlight: true },
          { label: '金幣倍率', value: '× 1', highlight: true },
          { label: '多開限制', value: 'IP 限制 3 開' },
          { label: '角色限制', value: '每帳號可創 4 隻' },
          { label: '公頻發話', value: 'Lv.10 以上' },
          { label: '密語發話', value: 'Lv.5 以上' },
        ],
      },
    ];
    return {
      sections: {
        announcements: { eyebrow: 'ANNOUNCEMENTS', title: '最新公告', buttonText: '查看全部公告', buttonUrl: 'pages/news.html' },
        quickLinks: { eyebrow: 'QUICK NAVIGATION', title: '快速目錄' },
        serverInfo: { eyebrow: 'SERVER INFO', title: '伺服器資訊' },
        updates: { eyebrow: 'PATCH NOTES', title: '更新歷程', buttonText: '查看完整歷程', buttonUrl: 'pages/updates.html' },
      },
      quickLinks: [
        { icon: '📥', title: '遊戲下載', description: '主程式下載', url: 'pages/download.html', visible: true },
        { icon: '🔧', title: '版本設定', description: '伺服器倍率', url: 'pages/version.html', visible: true },
        { icon: '📋', title: '更新歷程', description: '版本更新紀錄', url: 'pages/updates.html', visible: true },
        { icon: '🎉', title: '活動公告', description: '限時活動', url: 'pages/events.html', visible: true },
        { icon: '⚔️', title: '遊戲特色', description: '職業與系統', url: 'pages/features-jobs.html', visible: true },
        { icon: '👹', title: 'BOSS介紹', description: '時刻表與掉落', url: 'pages/boss-schedule.html', visible: true },
        { icon: '⚔️', title: '武器介紹', description: '武器製作強化', url: 'pages/weapons-overview.html', visible: true },
        { icon: '🛡️', title: '防具介紹', description: '防具總覽', url: 'pages/armor-overview.html', visible: true },
        { icon: '🎁', title: '道具介紹', description: '扭蛋龍眼等', url: 'pages/items-gacha.html', visible: true },
        { icon: '🧸', title: '娃娃介紹', description: '聖物系統', url: 'pages/dolls-guide.html', visible: true },
        { icon: '🎭', title: '變身介紹', description: '變身圖鑑', url: 'pages/transform-guide.html', visible: true },
        { icon: '🗺️', title: '地圖介紹', description: '地圖說明', url: 'pages/map.html', visible: true },
        { icon: '💎', title: '贊助說明', description: '贊助方案', url: 'pages/sponsor.html', visible: true },
        { icon: '❓', title: '常見問題', description: 'FAQ', url: 'pages/faq.html', visible: true },
        { icon: '📢', title: '推文說明', description: '推文獎勵', url: 'pages/promo.html', visible: true },
        { icon: '🎥', title: '直播說明', description: '直播合作', url: 'pages/stream.html', visible: true },
        { icon: '📄', title: '免責聲明', description: '規章制度', url: 'pages/disclaimer.html', visible: true },
        { icon: '📝', title: '申辦帳號', description: '立即加入', url: 'register.html', highlight: true, visible: true },
      ],
      serverCards: serverCards,
      updates: updates.map(function (u) {
        return Object.assign({ visible: true }, u);
      }),
    };
  }

  function mergeHome(base, data) {
    if (!data || typeof data !== 'object') return base;
    const sections = Object.assign({}, base.sections);
    Object.keys(data.sections || {}).forEach(function (key) {
      sections[key] = Object.assign({}, sections[key] || {}, data.sections[key] || {});
    });
    return {
      sections: sections,
      quickLinks: Array.isArray(data.quickLinks) && data.quickLinks.length ? data.quickLinks : base.quickLinks,
      serverCards: Array.isArray(data.serverCards) && data.serverCards.length ? data.serverCards : base.serverCards,
      updates: Array.isArray(data.updates) ? data.updates : base.updates,
    };
  }

  function loadHome(C) {
    const fallback = defaultHome(C);
    return fetch('data/home.json', { cache: 'no-store' })
      .then(function (res) {
        if (!res.ok) throw new Error('home data not found');
        return res.json();
      })
      .then(function (data) {
        return mergeHome(fallback, data);
      })
      .catch(function () {
        return fallback;
      });
  }

  function setText(id, value) {
    const el = document.getElementById(id);
    if (el && value !== undefined && value !== null) el.textContent = value;
  }

  function setButton(id, section) {
    const el = document.getElementById(id);
    if (!el || !section) return;
    if (section.buttonText) el.textContent = section.buttonText;
    if (section.buttonUrl) el.href = resolveLink(section.buttonUrl);
  }

  function renderSectionHeadings(home) {
    const s = home.sections || {};
    setText('ann-eyebrow', s.announcements && s.announcements.eyebrow);
    setText('ann-title', s.announcements && s.announcements.title);
    setButton('ann-button', s.announcements);
    setText('quick-eyebrow', s.quickLinks && s.quickLinks.eyebrow);
    setText('quick-title', s.quickLinks && s.quickLinks.title);
    setText('server-eyebrow', s.serverInfo && s.serverInfo.eyebrow);
    setText('server-title', s.serverInfo && s.serverInfo.title);
    setText('updates-eyebrow', s.updates && s.updates.eyebrow);
    setText('updates-title', s.updates && s.updates.title);
    setButton('updates-button', s.updates);
  }

  function renderQuickLinks(home) {
    const target = document.getElementById('dir-grid');
    const links = (home.quickLinks || []).filter(function (link) {
      return link.visible !== false;
    });
    target.innerHTML = links.length ? links.map(function (link) {
      return '<a href="' + escapeHTML(resolveLink(link.url || '#')) + '" class="dir-card' + (link.highlight ? ' highlight' : '') + '">' +
        '<span class="dir-icon">' + escapeHTML(link.icon || '•') + '</span>' +
        '<span class="dir-name">' + escapeHTML(link.title || '未命名') + '</span>' +
        '<span class="dir-desc">' + escapeHTML(link.description || '') + '</span>' +
        '</a>';
    }).join('') : '<p style="color:var(--text-dim);text-align:center;padding:30px 0;letter-spacing:2px;">暫無快速目錄</p>';
  }

  function renderServerInfo(home) {
    const target = document.getElementById('server-info');
    const cards = home.serverCards || [];
    target.innerHTML = cards.length ? cards.map(function (card) {
      const rows = Array.isArray(card.rows) ? card.rows : [];
      return '<div class="server-card">' +
        '<div class="server-card-name">' + escapeHTML(card.title || '') + '</div>' +
        '<div class="server-card-sub">' + escapeHTML(card.subtitle || '') + '</div>' +
        rows.map(function (row) {
          return '<div class="server-info-row">' +
            '<span class="server-info-key">' + escapeHTML(row.label || '') + '</span>' +
            '<span class="server-info-val' + (row.highlight ? ' hl' : '') + '">' + escapeHTML(row.value || '') + '</span>' +
            '</div>';
        }).join('') +
        '</div>';
    }).join('') : '<div class="notice blue">目前尚無伺服器資訊。</div>';
  }

  function visibleUpdates(home) {
    return (home.updates || []).filter(function (u) {
      return u.visible !== false;
    });
  }

  function renderUpdates(home) {
    const target = document.getElementById('update-list');
    const updates = visibleUpdates(home);
    target.innerHTML = updates.length ? updates.slice(0, 6).map(function (u) {
      return '<div class="update-item">' +
        '<span class="update-date">' + escapeHTML(u.date || '') + '</span>' +
        '<span class="update-tag">' + escapeHTML(u.tag || '') + '</span>' +
        '<span class="update-content">' + escapeHTML(u.content || '') + '</span>' +
        '</div>';
    }).join('') : '<p style="color:var(--text-dim);text-align:center;padding:30px 0;letter-spacing:2px;">暫無更新記錄</p>';
  }

  function fill() {
    if (typeof FORUM_CONFIG === 'undefined') { setTimeout(fill, 30); return; }
    const C = FORUM_CONFIG;

    if (C.serverVersion) {
      document.getElementById('hero-eyebrow').textContent =
        'LINEAGE PRIVATE SERVER · VERSION ' + C.serverVersion;
    }
    const heroVideo = document.getElementById('hero-video');
    if (heroVideo && C.heroVideo) heroVideo.src = C.heroVideo;
    const heroCharacter = document.getElementById('hero-character');
    if (heroCharacter && C.heroImage) {
      heroCharacter.src = C.heroImage;
      heroCharacter.alt = C.forumFullName || C.forumName;
    }
    const heroBrandLogo = document.getElementById('hero-brand-logo');
    if (heroBrandLogo && C.brandLogo) {
      heroBrandLogo.src = C.brandLogo;
      heroBrandLogo.alt = (C.forumName || '曜舞天堂') + ' LOGO';
    }
    document.getElementById('hero-title-main').childNodes[0].textContent = C.heroTitle || C.forumName;
    document.getElementById('hero-title-sub').textContent = C.heroSubTitle || '經典不敗';
    document.getElementById('hero-tagline').textContent = C.forumSlogan || '';

    const statsEl = document.getElementById('hero-stats');
    const stats = [
      { val: C.serverVersion || '381', label: '版　本' },
      { val: '× 3', label: '經驗倍率' },
      { val: '× 2', label: '掉落倍率' },
      { val: '× 1', label: '金幣倍率' },
    ];
    statsEl.innerHTML = stats.map(function (s, i) {
      return (i > 0 ? '<div class="hero-stat-sep"></div>' : '') +
        '<div class="hero-stat">' +
        '<div class="hero-stat-val">' + escapeHTML(s.val) + '</div>' +
        '<div class="hero-stat-label">' + escapeHTML(s.label) + '</div>' +
        '</div>';
    }).join('');

    loadHome(C).then(function (home) {
      renderSectionHeadings(home);
      renderQuickLinks(home);
      renderServerInfo(home);
      renderUpdates(home);

      const annGrid = document.getElementById('ann-grid');
      const cmsFallback = Object.assign({}, C, { updates: visibleUpdates(home) });
      if (window.ForumCmsPosts) {
        ForumCmsPosts.renderAnnouncements(annGrid, cmsFallback);
      } else {
        annGrid.innerHTML = '<p style="color:var(--text-dim);text-align:center;padding:30px 0;letter-spacing:2px;">文章讀取中</p>';
      }
    });
  }
  fill();
})();
</script>
</body>
</html>
